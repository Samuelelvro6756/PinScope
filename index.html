<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinScope</title>
    <link rel="icon" href="sources/chip-icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>
                <img src="sources/chip-icon.svg" alt="PinScope Logo" class="app-logo">
                PinScope
            </h1>
            <div class="controls">
                <div class="select-wrapper">
                    <span class="ecu-label">ECU:</span>
                    <select id="ecu-selector" class="ecu-select">
                        <option value="me17">HYUNDAY ACCENT L4-1.6L 2008</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="top-content">
                <section class="visualizer-section">
                    <div class="glass-panel">
                        <h2 id="ecu-title"></h2>
                        <div class="connector-wrapper">
                            <!-- The grid will be generated by JS -->
                            <div id="connector-grid" class="connector-grid"></div>
                        </div>
                    </div>
                    <div class="glass-panel reference-panel">
                        <h3>Referencias</h3>
                        <div class="reference-image-container">
                            <img src="sources/HYUNDAY-ACCENT-L4-1.6L-2008/ecu-reference.png"
                                alt="Referencia ECU Bosch ME17.9.11.1" class="ecu-reference-image">
                            <img src="sources/HYUNDAY-ACCENT-L4-1.6L-2008/ecu.png" alt="ECU Real"
                                class="ecu-reference-image">
                        </div>
                    </div>
                </section>

                <section class="list-section">
                    <div class="glass-panel"
                        style="display: flex; flex-direction: column; height: 100%; padding: 1.5rem; overflow: hidden;">
                        <h3 class="list-title">Resumen de Pines</h3>
                        <div class="table-scroll-container">
                            <table class="summary-table">
                                <thead>
                                    <tr>
                                        <th>FUNCIÓN</th>
                                        <th>COLOR</th>
                                        <th>PIN</th>
                                    </tr>
                                </thead>
                                <tbody id="summary-table-body">
                                    <!-- Generated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>

            <section class="general-table-section">
                <div class="glass-panel">
                    <h3>Tabla General de Pines</h3>
                    <div id="general-pin-table" class="general-pin-table">
                        <!-- Table content generated by JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
